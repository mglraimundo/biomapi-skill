name: Build CLI zip

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'Rebuild distribution zip')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Build biomapi-cli.zip
        run: |
          mkdir -p _cli_build
          cp skills/biomapi/scripts/biomapi.py _cli_build/biomapi.py
          cp cli/README.md _cli_build/README.md
          cd _cli_build && zip -r ../biomapi-cli.zip .

      - name: Commit zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add biomapi-cli.zip
          git diff --cached --quiet && echo "No changes" || git commit -m "Rebuild distribution zip" && git push
