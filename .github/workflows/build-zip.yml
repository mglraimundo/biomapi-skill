name: Build skill zip

on:
  push:
    branches: [main]
    paths:
      - 'skills/biomapi/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Build zip
        run: cd skills && zip -r ../biomapi-skill.zip biomapi/

      - name: Commit zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add biomapi-skill.zip
          git diff --cached --quiet && echo "No changes" || git commit -m "Rebuild biomapi-skill.zip" && git push
